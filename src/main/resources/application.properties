# Server
server.port=${PORT:8080}

# Database - uses Railway's env variables in production, local values in dev
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/task_manager_db}
spring.datasource.username=${DATABASE_USERNAME:taskuser}
spring.datasource.password=${DATABASE_PASSWORD:taskpass123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT
app.jwt.secret=${JWT_SECRET:ThisIsAVeryLongSecretKeyForJWTToken12345678}
app.jwt.expiration-ms=86400000

# Static files
spring.web.resources.static-locations=classpath:/static/
spring.mvc.static-path-pattern=/**