<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — Task Manager</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
    <h1>Task Manager</h1>
    <div class="navbar-right">
        <span id="user-name">Loading...</span>
        <button class="btn btn-danger" onclick="logout()">Logout</button>
    </div>
</nav>

<!-- Main Content -->
<div class="container">

    <!-- Stats -->
    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-number" id="total-projects">0</div>
            <div class="stat-label">Total Projects</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="total-tasks">0</div>
            <div class="stat-label">My Tasks</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="done-tasks">0</div>
            <div class="stat-label">Completed Tasks</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="overdue-tasks" style="color:#e53e3e">0</div>
            <div class="stat-label">Overdue Tasks</div>
        </div>
    </div>

    <!-- Projects Header -->
    <div class="page-header">
        <h2>My Projects</h2>
        <button class="btn btn-primary" onclick="openCreateModal()">+ New Project</button>
    </div>

    <!-- Alert -->
    <div id="alert-box"></div>

    <!-- Projects Grid -->
    <div class="projects-grid" id="projects-grid">
        <p style="color:#888">Loading projects...</p>
    </div>

</div>

<!-- Create Project Modal -->
<div class="modal-overlay" id="create-modal">
    <div class="modal">
        <h3>Create New Project</h3>
        <div class="form-group">
            <label>Project Name</label>
            <input type="text" id="project-name" placeholder="e.g. Website Redesign">
        </div>
        <div class="form-group">
            <label>Description</label>
            <textarea id="project-desc" rows="3" placeholder="What is this project about?"></textarea>
        </div>
        <div class="modal-footer">
            <button class="btn btn-outline" onclick="closeCreateModal()">Cancel</button>
            <button class="btn btn-primary" onclick="createProject()">Create</button>
        </div>
    </div>
</div>

<script src="js/dashboard.js"></script>
</body>
</html>
