<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager — Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="auth-container">
    <div class="auth-box">
        <h2>Task Manager</h2>

        <div class="auth-tabs">
            <div class="auth-tab active" onclick="showTab('login')">Login</div>
            <div class="auth-tab" onclick="showTab('signup')">Sign Up</div>
        </div>

        <div id="alert-box"></div>

        <!-- Login Form -->
        <div id="login-form">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="login-email" placeholder="you@example.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="login-password" placeholder="••••••">
            </div>
            <button class="btn btn-primary form-btn" onclick="login()">Login</button>
        </div>

        <!-- Signup Form -->
        <div id="signup-form" style="display:none">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="signup-name" placeholder="John Doe">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="signup-email" placeholder="you@example.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="signup-password" placeholder="Min 6 characters">
            </div>
            <button class="btn btn-primary form-btn" onclick="signup()">Create Account</button>
        </div>
    </div>
</div>

<script src="js/auth.js"></script>
</body>
</html>
